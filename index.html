<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magma Escape</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game-container">
        <div id="titleScreen">
            <h1>MAGMA ESCAPE</h1>
            <button id="startBtn">START [SPACE/CLICK]</button>

            <div class="btn-group">
                <button id="openSettings" class="sub-btn">SETTINGS</button>
                <button id="openHowTo" class="sub-btn">HOW TO PLAY</button>
            </div>
        </div>

        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <h2>Audio Settings</h2>
                <div class="volume-control">
                    <span>BGM VOLUME</span>
                    <input type="range" id="bgmSlider" min="0" max="1" step="0.1" value="0.5">
                </div>
                <div class="volume-control">
                    <span>SE VOLUME</span>
                    <input type="range" id="seSlider" min="0" max="1" step="0.1" value="0.5">
                </div>
                <button id="closeSettings" class="sub-btn">OK</button>
            </div>
        </div>

        <div id="howToModal" class="modal">
            <div class="modal-content">
                <h2>How to Play</h2>
                <div class="controls-guide">
                    <p><b>MOVE:</b> [A / D] or [← / →]</p>
                    <p><b>JUMP:</b> [Space / W / ↑]</p>
                    <p><b>DASH:</b> [Shift]</p>
                    <p><b>RESET:</b> [R]</p>
                </div>
                <button id="closeHowTo" class="sub-btn">CLOSE</button>
            </div>
        </div>

        <div class="ui" id="gameUI">
            <div class="stats">SCORE: <span id="score">0</span></div>
            <div class="stats">HEIGHT: <span id="dist">0</span>m</div>
            <div class="dash-wrapper">
                <div id="dashContainer">
                    <div id="dashBar"></div>
                </div>
            </div>
        </div>

        <div id="msg">
            <h1 id="statusH1">BURNED!</h1>
            <p>FINAL SCORE: <span id="finalScore">0</span></p>
            <button id="resetBtn">RETRY [R]</button>
        </div>

        <canvas id="gameCanvas" width="1200" height="600"></canvas>

        <div id="touch-controls" class="touch-only">
            <div class="left-group">
                <div id="btn-left" class="touch-btn">◀</div>
                <div id="btn-right" class="touch-btn">▶</div>
            </div>
            <div class="right-group">
                <div id="btn-dash" class="touch-btn dash-btn">DASH</div>
                <div id="btn-jump" class="touch-btn jump-btn">JUMP</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
