<!DOCTYPE html>
<html lang="ja">

<head>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Magma Escape">
    <meta name="apple-mobile-web-app-title" content="Magma Escape">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="full-screen" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
    <title>Magma Escape</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game-container">
        <div id="titleScreen">
            <h1>MAGMA ESCAPE</h1>
            <button id="startBtn">START [SPACE/CLICK]</button>

            <div class="btn-group">
                <button id="openSettings" class="sub-btn">SETTINGS</button>
                <button id="openHowTo" class="sub-btn">HOW TO PLAY</button>
            </div>
        </div>

        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <h2>Audio Settings</h2>
                <div class="volume-control">
                    <span>BGM VOLUME</span>
                    <input type="range" id="bgmSlider" min="0" max="1" step="0.1" value="0.5">
                </div>
                <div class="volume-control">
                    <span>SE VOLUME</span>
                    <input type="range" id="seSlider" min="0" max="1" step="0.1" value="0.5">
                </div>
                <button id="closeSettings" class="sub-btn">OK</button>
            </div>
        </div>

        <div id="howToModal" class="modal">
            <div class="modal-content">
                <h2>How to Play</h2>
                <div class="controls-guide">
                    <p><b>MOVE:</b> [A / D] or [← / →]</p>
                    <p><b>JUMP / DOUBLE JUMP:</b> [Space / W / ↑]</p>
                    <p><b>DASH:</b> [Shift]</p>
                    <p><b>RESET:</b> [R]</p>
                    <p><b>TITLE:</b> [ESC]</p>
                </div>
                <button id="closeHowTo" class="sub-btn">CLOSE</button>
            </div>
        </div>

        <div class="ui" id="gameUI">
            <div class="stats">SCORE: <span id="score">0</span></div>
            <div class="stats">HEIGHT: <span id="dist">0</span>m</div>
            <div class="dash-wrapper">
                <div id="dashContainer">
                    <div id="dashBar"></div>
                </div>
            </div>
        </div>

        <!-- モバイルタッチコントロール -->
        <div id="touchControls" class="touch-controls">
            <div class="touch-button-group left">
                <button id="leftBtn" class="touch-btn touch-left" data-action="left" draggable="false">←</button>
                <button id="rightBtn" class="touch-btn touch-right" data-action="right" draggable="false">→</button>
            </div>
            <div class="touch-button-group right">
                <button id="jumpBtn" class="touch-btn touch-jump" data-action="jump" draggable="false">JUMP</button>
                <button id="dashBtn" class="touch-btn touch-dash" data-action="dash" draggable="false">DASH</button>
            </div>
        </div>

        <!-- 縦向き警告 -->
        <div id="orientationWarning" class="orientation-warning" style="display:none;">
            <p>Please rotate your device to landscape mode</p>
        </div>

        <div id="msg">
            <h1 id="statusH1">GAME OVER!</h1>
            <p>FINAL SCORE: <span id="finalScore">0</span></p>
            <p>BEST: <span id="highScoreEl">0</span></p>
            <button id="resetBtn">RETRY [R]</button>
        </div>

        <canvas id="gameCanvas" width="1200" height="600"></canvas>
    </div>

    <script src="script.js"></script>
</body>

</html>
